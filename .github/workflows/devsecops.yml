name: FOSS Enterprise DevSecOps

on:
  push:
    branches: [ "main", "fix/**" ]
  pull_request:
    branches: [ "main" ]
  # Trigger manual
  workflow_dispatch:

jobs:
  # ==========================================
  # Gate 0: Pipeline for Pipelines
  # ==========================================
  pipeline-security:
    name: "Gate 0: Actionlint & Zizmor"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check workflow YAML syntax (Actionlint)
        uses: raven-actions/actionlint@v2

      - name: Analyze workflow security logic (Zizmor)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pip install zizmor
          zizmor .github/workflows || echo "Zizmor audit complete (non-blocking for MVP)."

  # ==========================================
  # Gate 1: SAST (Static Analysis)
  # ==========================================
  sast-semgrep:
    name: "Gate 1: Semgrep (SAST)"
    needs: pipeline-security
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Semgrep with Strict CI Enforcements
        run: semgrep scan --config auto --error

  # ==========================================
  # Gate 3: Dependências e Infraestrutura (SCA)
  # ==========================================
  sca-trivy:
    name: "Gate 3: Trivy (SCA & Config)"
    needs: sast-semgrep
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner on repo (Requirements / Package.json / Dockerfile)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'table'
          # CRITICAL OR HIGH breaks the pipeline instantly (exit 1)
          exit-code: 1
          severity: 'CRITICAL,HIGH'
          trivyignores: '.trivyignore'

  # ==========================================
  # Gate 4: Code Quality & Complexity
  # ==========================================
  quality-ruff:
    name: "Gate 4: Ruff (Python Code Quality)"
    needs: sast-semgrep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      # Fail heavily on Syntax, Cyclomatic Complexity or Bad formatting
      - run: ruff check .

  # ==========================================
  # Aggregate Job for Branch Protection
  # ==========================================
  foss-enterprise-devsecops:
    name: "FOSS Enterprise DevSecOps"
    # Needs all other gates to complete successfully
    needs: [pipeline-security, sast-semgrep, sca-trivy, quality-ruff]
    runs-on: ubuntu-latest
    steps:
      - run: echo "All FOSS Enterprise DevSecOps Gates Passed!"
