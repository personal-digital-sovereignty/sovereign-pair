name: FOSS Enterprise DevSecOps

on:
  push:
    branches: [ "main", "fix/**" ]
  pull_request:
    branches: [ "main" ]
  # Trigger manual
  workflow_dispatch:

jobs:
  # ==========================================
  # Gate 0: Pipeline for Pipelines
  # ==========================================
  pipeline-security:
    name: "Gate 0: Actionlint & Zizmor"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check workflow YAML syntax (Actionlint)
        uses: raven-actions/actionlint@v2

      - name: Analyze workflow security logic (Zizmor)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pip install zizmor
          zizmor .github/workflows || echo "Zizmor audit complete (non-blocking for MVP)."

  # ==========================================
  # Gate 1: SAST (Static Analysis)
  # ==========================================
  sast-semgrep:
    name: "Gate 1: Semgrep (SAST)"
    needs: pipeline-security
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Semgrep with Strict CI Enforcements
        run: semgrep scan --config auto --error

  # ==========================================
  # Gate 3: Dependências e Infraestrutura (SCA)
  # ==========================================
  sca-trivy:
    name: "Gate 3: Trivy (SCA & Config)"
    needs: sast-semgrep
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner on repo (Requirements / Package.json / Dockerfile)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'table'
          # CRITICAL OR HIGH breaks the pipeline instantly (exit 1)
          exit-code: 1
          severity: 'CRITICAL,HIGH'

  # ==========================================
  # Gate 4: Code Quality & Complexity (Rust)
  # ==========================================
  quality-rust:
    name: "Gate 4: Rust Clippy & Unit Tests"
    needs: sast-semgrep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: core
      - name: Install SQLite Runtime Dependencies
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev
      # Fail heavily on Syntax, Memory Safety or Formatting
      - name: Cargo Clippy Audit
        working-directory: ./core
        run: cargo clippy -- -D warnings
      - name: Cargo Test Runner
        working-directory: ./core
        run: cargo test

  # ==========================================
  # Gate 5: SvelteKit UI Analysis
  # ==========================================
  quality-svelte:
    name: "Gate 5: Svelte Static Analyzer"
    needs: pipeline-security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: 'svelte-ui/package-lock.json'
      - name: Install Dependencies
        working-directory: ./svelte-ui
        run: npm ci
      - name: Run SvelteKit Check
        working-directory: ./svelte-ui
        run: npm run check

  # ==========================================
  # Aggregate Job for Branch Protection
  # ==========================================
  foss-enterprise-devsecops:
    name: "FOSS Enterprise DevSecOps"
    # Needs all other gates to complete successfully
    needs: [pipeline-security, sast-semgrep, sca-trivy, quality-rust, quality-svelte]
    runs-on: ubuntu-latest
    steps:
      - run: echo "All FOSS Enterprise DevSecOps Gates Passed! Emitting Release Signal."
