name: Desktop Build & Release (Windows)

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Choose the build type'
        required: true
        default: 'nightly'
        type: choice
        options:
          - nightly
          - release
      tag_name:
        description: 'Set Tag version if Release (e.g. 0.5.0). Ignored for nightly.'
        required: false
        type: string

jobs:
  build-tauri:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install Vue Dependencies
        working-directory: ./desktop
        run: npm ci

      - name: Build Rust Core Sidecar (sovereign-axum)
        working-directory: ./core
        run: |
          cargo build --release --target x86_64-pc-windows-msvc
          mkdir -p ../desktop/src-tauri/binaries
          cp target/x86_64-pc-windows-msvc/release/sovereign-core.exe ../desktop/src-tauri/binaries/sovereign-axum-x86_64-pc-windows-msvc.exe

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: "./desktop"
          tagName: ${{ github.event.inputs.build_type == 'nightly' && 'nightly' || github.event.inputs.tag_name }}
          releaseName: ${{ github.event.inputs.build_type == 'nightly' && 'Sovereign Pair Desktop (Nightly)' || format('Sovereign Pair Desktop {0}', github.event.inputs.tag_name) }}
          releaseBody: "Automated Tauri build for Windows."
          releaseDraft: false
          prerelease: ${{ github.event.inputs.build_type == 'nightly' }}
          args: --runner cargo
