name: Desktop Build & Release (Windows)

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Choose the build type'
        required: true
        default: 'nightly'
        type: choice
        options:
          - nightly
          - release
      tag_name:
        description: 'Set Tag version if Release (e.g. 0.5.0). Ignored for nightly.'
        required: false
        type: string

jobs:
  build-tauri:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install Vue Dependencies
        working-directory: ./desktop
        run: npm ci

      - name: Build Rust Core Sidecar (sovereign-axum)
        working-directory: ./core
        run: |
          cargo build --release --target x86_64-pc-windows-msvc
          mkdir -p ../desktop/src-tauri/binaries
          cp target/x86_64-pc-windows-msvc/release/sovereign-core.exe ../desktop/src-tauri/binaries/sovereign-axum-x86_64-pc-windows-msvc.exe

      - name: Generate Dynamic Version
        id: versioning
        shell: bash
        run: |
          TIMESTAMP=$(date +'%Y%m%d%H%M')
          if [ "${{ github.event.inputs.build_type }}" == "nightly" ]; then
            TAG_NAME="0.4.0-${TIMESTAMP}"
            RELEASE_NAME="Sovereign Pair Desktop (Nightly ${TAG_NAME})"
            cd desktop/src-tauri
            jq --arg v "$TAG_NAME" '.version = $v' tauri.conf.json > tmp.json && mv tmp.json tauri.conf.json
            cd ../..
          else
            TAG_NAME="${{ github.event.inputs.tag_name }}"
            RELEASE_NAME="Sovereign Pair Desktop ${TAG_NAME}"
            cd desktop/src-tauri
            jq --arg v "$TAG_NAME" '.version = $v' tauri.conf.json > tmp.json && mv tmp.json tauri.conf.json
            cd ../..
          fi
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "release_name=$RELEASE_NAME" >> $GITHUB_OUTPUT

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGN_WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTS_CERTIFICATE_BASE64 }}
          TAURI_SIGN_WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTS_CERTIFICATE_PASSWORD }}
        with:
          projectPath: "./desktop"
          tagName: desktop_${{ steps.versioning.outputs.tag_name }}
          releaseName: ${{ steps.versioning.outputs.release_name }}
          releaseBody: "Automated Tauri build for Windows. Note: The installer (.msi) is self-signed (Sovereign Pair Local Cert). You may need to click 'More Info' -> 'Run anyway' on Windows SmartScreen for this Nightly build."
          releaseDraft: false
          prerelease: ${{ github.event.inputs.build_type == 'nightly' }}
          args: --runner cargo
