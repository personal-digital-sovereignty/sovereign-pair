name: CLI / Core RAG CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'src/**/*.py'
      - 'tests/**/*.py'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'src/**/*.py'
      - 'tests/**/*.py'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest
          pip install -r src/requirements.txt

      - name: Lint with Ruff
        run: |
          ruff check .

      - name: Run PyTest
        run: |
          pytest tests/
