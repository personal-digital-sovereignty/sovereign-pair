name: Build Standalone Binaries

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]

jobs:
  build-linux-core:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js (For Web-UI Build)
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: 'web-ui/package-lock.json'

      - name: Build Web UI (Vue 3 Vite)
        working-directory: ./web-ui
        run: |
          npm ci
          npm run build

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
          
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: core

      - name: Install SQLite Runtime Dependencies
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev

      - name: Compile Sovereign Cibrid Core (Rust)
        working-directory: ./core
        run: |
          cargo build --release

      - name: Upload Core Artifact (Linux x86_64)
        uses: actions/upload-artifact@v4
        with:
          name: sovereign-core-linux-amd64
          path: core/target/release/sovereign-core

  build-kde-plasmoid:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Package KDE Plasma 6 Widget
        working-directory: ./desktop/plasma-widget
        run: |
          # A KDE .plasmoid is dynamically just a structurally valid ZIP file
          zip -r ../../sovereign-pair-widget.plasmoid metadata.json contents/

      - name: Upload Plasmoid Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sovereign-pair-kde-widget
          path: sovereign-pair-widget.plasmoid

  publish-nightly:
    needs: [build-linux-core, build-kde-plasmoid]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Download all built artifacts
        uses: actions/download-artifact@v4
      
      - name: Update Nightly Tag
        uses: richardsimko/update-tag@v1
        with:
          tag_name: nightly
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Generate Nightly Pre-Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: "Sovereign Pair Nightly (Unstable)"
          prerelease: true
          make_latest: false
          body: |
            Builds automatizados (Nightly) do Sovereign Pair contendo a arquitetura puramente nativa em RUST e Plasma Desktop.
            
            🚨 **Aviso:** Estes binários são compilados progressivamente (Continuous Deployment) no último commit da branch `main` e não refletem garantias de estabilidade.
          files: |
            sovereign-core-linux-amd64/sovereign-core
            sovereign-pair-kde-widget/sovereign-pair-widget.plasmoid
