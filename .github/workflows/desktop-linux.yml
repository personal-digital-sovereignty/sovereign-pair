name: Desktop Build & Release (Linux)

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Choose the build type'
        required: true
        default: 'nightly'
        type: choice
        options:
          - nightly
          - release
      tag_name:
        description: 'Set Tag version if Release (e.g. 0.5.0). Ignored for nightly.'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-tauri:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install Linux Dependencies (Webkit & GTK)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install Vue Dependencies
        working-directory: ./desktop
        run: npm ci

      - name: Build Web-UI PWA (For Rust Embed)
        working-directory: ./web-ui
        run: |
          npm ci
          npm run build

      - name: Build Rust Core Sidecar (sovereign-axum)
        working-directory: ./core
        run: |
          cargo build --release --target x86_64-unknown-linux-gnu
          mkdir -p ../desktop/src-tauri/binaries
          cp target/x86_64-unknown-linux-gnu/release/sovereign-core ../desktop/src-tauri/binaries/sovereign-axum-x86_64-unknown-linux-gnu

      - name: Generate Dynamic Version
        id: versioning
        shell: bash
        run: |
          TIMESTAMP=$(date +'%Y%m%d%H%M')
          if [ "${{ github.event.inputs.build_type }}" == "nightly" ]; then
            TAG_NAME="0.4.0-${TIMESTAMP}"
            RELEASE_NAME="Sovereign Pair Desktop Linux (Nightly ${TAG_NAME})"
            cd desktop/src-tauri
            jq --arg v "$TAG_NAME" '.version = $v' tauri.conf.json > tmp.json && mv tmp.json tauri.conf.json
            cd ../..
          else
            TAG_NAME="${{ github.event.inputs.tag_name }}"
            RELEASE_NAME="Sovereign Pair Desktop Linux ${TAG_NAME}"
            cd desktop/src-tauri
            jq --arg v "$TAG_NAME" '.version = $v' tauri.conf.json > tmp.json && mv tmp.json tauri.conf.json
            cd ../..
          fi
          echo "tag_name=desktop_linux_$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "release_name=$RELEASE_NAME" >> "$GITHUB_OUTPUT"

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: "./desktop"
          tagName: ${{ steps.versioning.outputs.tag_name }}
          releaseName: ${{ steps.versioning.outputs.release_name }}
          releaseBody: "Automated Tauri build for Linux. \n\n* Note: Requires the Cíbrid Backend to be running natively on `localhost:8000` & `38001`."
          releaseDraft: false
          prerelease: ${{ github.event.inputs.build_type == 'nightly' }}
          args: ${{ github.event.inputs.build_type == 'nightly' && '--runner cargo' || '--runner cargo' }}
