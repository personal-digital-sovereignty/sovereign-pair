name: Desktop Build & Release (MacOS)

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Choose the build type'
        required: true
        default: 'nightly'
        type: choice
        options:
          - nightly
          - release
      tag_name:
        description: 'Set Tag version if Release (e.g. 0.5.0). Ignored for nightly.'
        required: false
        type: string

jobs:
  build-tauri:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin, aarch64-apple-darwin

      - name: Install Vue Dependencies
        working-directory: ./desktop
        run: npm ci

      - name: Build Rust Core Sidecar (sovereign-axum) Universal
        working-directory: ./core
        run: |
          # Build specifically for both architectures
          cargo build --release --target x86_64-apple-darwin
          cargo build --release --target aarch64-apple-darwin
          
          # Combine them using lipo into a Universal Binary for Tauri Sidecar
          mkdir -p ../desktop/src-tauri/binaries
          rustup target add universal-apple-darwin || true
          lipo -create -output ../desktop/src-tauri/binaries/sovereign-axum-universal-apple-darwin \
            target/x86_64-apple-darwin/release/sovereign-core \
            target/aarch64-apple-darwin/release/sovereign-core

      - name: Generate Dynamic Version
        id: versioning
        shell: bash
        run: |
          TIMESTAMP=$(date +'%Y%m%d%H%M')
          if [ "${{ github.event.inputs.build_type }}" == "nightly" ]; then
            TAG_NAME="0.4.0-${TIMESTAMP}"
            RELEASE_NAME="Sovereign Pair Desktop MacOS (Nightly ${TAG_NAME})"
            cd desktop/src-tauri
            jq --arg v "$TAG_NAME" '.version = $v' tauri.conf.json > tmp.json && mv tmp.json tauri.conf.json
            cd ../..
          else
            TAG_NAME="${{ github.event.inputs.tag_name }}"
            RELEASE_NAME="Sovereign Pair Desktop MacOS ${TAG_NAME}"
            cd desktop/src-tauri
            jq --arg v "$TAG_NAME" '.version = $v' tauri.conf.json > tmp.json && mv tmp.json tauri.conf.json
            cd ../..
          fi
          echo "tag_name=desktop_macos_universal_$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "release_name=$RELEASE_NAME" >> "$GITHUB_OUTPUT"

      - name: Build Tauri App (Ad-Hoc Unsigned)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: "./desktop"
          tagName: ${{ steps.versioning.outputs.tag_name }}
          releaseName: ${{ steps.versioning.outputs.release_name }}
          releaseBody: "Automated Tauri build for MacOS (Universal Binary - Intel & Apple Silicon).\n\n⚠️ **Gatekeeper Bypass:** Because this app is Open Source Ad-Hoc Signed, you MUST run this command once in your MacOS Terminal after dragging to the Applications folder:\n\n`xattr -cr /Applications/SovereignPair.app`"
          releaseDraft: false
          prerelease: ${{ github.event.inputs.build_type == 'nightly' }}
          args: --target universal-apple-darwin --runner cargo
