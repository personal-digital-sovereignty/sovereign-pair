name: Desktop Build & Release (macOS)

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Choose the build type'
        required: true
        default: 'nightly'
        type: choice
        options:
          - nightly
          - release
      tag_name:
        description: 'Set Tag version if Release (e.g. 0.5.0). Ignored for nightly.'
        required: false
        type: string

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            arch: intel
          - target: aarch64-apple-darwin
            arch: silicon
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Vue Dependencies
        working-directory: ./desktop
        run: npm ci

      - name: Build Rust Core Sidecar (sovereign-axum)
        working-directory: ./core
        run: |
          cargo build --release --target ${{ matrix.target }}
          mkdir -p ../desktop/src-tauri/binaries
          cp target/${{ matrix.target }}/release/sovereign-core ../desktop/src-tauri/binaries/sovereign-axum-${{ matrix.target }}

      - name: Generate Dynamic Version
        id: versioning
        shell: bash
        run: |
          TIMESTAMP=$(date +'%Y%m%d%H%M')
          if [ "${{ github.event.inputs.build_type }}" == "nightly" ]; then
            TAG_NAME="0.4.0-${TIMESTAMP}"
            RELEASE_NAME="Sovereign Pair Desktop (Nightly ${TAG_NAME})"
            cd desktop/src-tauri
            jq --arg v "$TAG_NAME" '.version = $v' tauri.conf.json > tmp.json && mv tmp.json tauri.conf.json
            cd ../..
          else
            TAG_NAME="${{ github.event.inputs.tag_name }}"
            RELEASE_NAME="Sovereign Pair Desktop ${TAG_NAME}"
            cd desktop/src-tauri
            jq --arg v "$TAG_NAME" '.version = $v' tauri.conf.json > tmp.json && mv tmp.json tauri.conf.json
            cd ../..
          fi
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "release_name=$RELEASE_NAME" >> $GITHUB_OUTPUT

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: "./desktop"
          tagName: desktop_${{ steps.versioning.outputs.tag_name }}
          releaseName: ${{ steps.versioning.outputs.release_name }}
          releaseBody: "Automated Tauri build for macOS."
          releaseDraft: false
          prerelease: ${{ github.event.inputs.build_type == 'nightly' }}
          args: --runner cargo --target ${{ matrix.target }}
