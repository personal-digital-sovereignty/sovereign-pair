name: Desktop Build & Release (macOS)

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Choose the build type'
        required: true
        default: 'nightly'
        type: choice
        options:
          - nightly
          - release
      tag_name:
        description: 'Set Tag version if Release (e.g. 0.5.0). Ignored for nightly.'
        required: false
        type: string

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            arch: intel
          - target: aarch64-apple-darwin
            arch: silicon
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Vue Dependencies
        working-directory: ./desktop
        run: npm ci

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: "./desktop"
          tagName: ${{ github.event.inputs.build_type == 'nightly' && 'nightly' || github.event.inputs.tag_name }}
          releaseName: ${{ github.event.inputs.build_type == 'nightly' && 'Sovereign Pair Desktop (Nightly)' || format('Sovereign Pair Desktop {0}', github.event.inputs.tag_name) }}
          releaseBody: "Automated Tauri build for macOS."
          releaseDraft: false
          prerelease: ${{ github.event.inputs.build_type == 'nightly' }}
          args: --runner cargo --target ${{ matrix.target }}
