name: Backend API CI/CD

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: personal-digital-sovereignty/sovereign-pair-api

jobs:
  # Opcionalmente aguardar o status do Workflow DevSecOps FOSS via GitHub Actions UI logic, 
  # ou usar Reusable Workflows se fossem arquivos dependentes.
  # Para simplificar e rodar paralelo bloqueando pelo Branch Protection no GitHub:
  lint-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Linting Tools and Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest pytest-mock
          pip install -r src/requirements.txt

      - name: Lint with Ruff
        run: |
          ruff check .

      - name: Run PyTest
        run: |
          pytest tests/

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./infra/docker/Dockerfile.api
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
