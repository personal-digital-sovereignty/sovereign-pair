name: Backend API CI/CD

on:
  push:
    branches: [ "main" ]
    paths:
      - 'src/api/**'
      - 'Dockerfile.api'
      - 'requirements.txt'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'src/api/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-api

jobs:
  # Opcionalmente aguardar o status do Workflow DevSecOps FOSS via GitHub Actions UI logic, 
  # ou usar Reusable Workflows se fossem arquivos dependentes.
  # Para simplificar e rodar paralelo bloqueando pelo Branch Protection no GitHub:
  lint-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Linting Tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest

      - name: Lint with Ruff
        run: |
          ruff check src/api/ --ignore E501

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        if: github.event_name == 'push'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API Docker image
        uses: docker/build-push-action@v5
        if: github.event_name == 'push'
        with:
          context: .
          file: ./Dockerfile.api
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
