name: "Deploy Sovereign Cibrid Cloud (OCI)"

on:
  push:
    branches:
      - main
    paths:
      - 'infra/terraform/**'
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform Action to perform'
        required: true
        default: 'apply'
        type: choice
        options:
          - apply
          - destroy
      release_version:
        description: 'Release Target (Ex: 0.7.1, 0.7.0, nightly, ou deixe "latest")'
        required: true
        default: 'latest'
        type: string

jobs:
  opentofu-action:
    name: "OpenTofu Apply & Binary Deployment (Oracle ARM A1)"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./infra/terraform

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Resolve Release Version
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TARGET_VERSION="${{ github.event.inputs.release_version }}"
          if [ -z "$TARGET_VERSION" ] || [ "$TARGET_VERSION" == "latest" ]; then
            # Github event default ou push em main -> Busca a mais recente no repositorio
            LATEST=$(gh release list --limit 1 | awk '{print $1}')
            echo "version=$LATEST" >> $GITHUB_ENV
            echo "A versão Dinâmica Selecionada foi: $LATEST"
          else
            echo "version=$TARGET_VERSION" >> $GITHUB_ENV
            echo "A versão Manual Apontada foi: $TARGET_VERSION"
          fi

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_wrapper: false
          tofu_version: latest

      - name: OpenTofu Init
        run: tofu init

      - name: OpenTofu Validate
        run: tofu validate

      - name: OpenTofu Action (Infrastructure as Code)
        env:
          TF_VAR_tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }}
          TF_VAR_user_ocid: ${{ secrets.OCI_USER_OCID }}
          TF_VAR_fingerprint: ${{ secrets.OCI_FINGERPRINT }}
          TF_VAR_private_key: ${{ secrets.OCI_PRIVATE_KEY }}
          TF_VAR_region: ${{ vars.OCI_REGION || 'sa-saopaulo-1' }}
          TF_VAR_compartment_ocid: ${{ secrets.OCI_COMPARTMENT_OCID != '' && secrets.OCI_COMPARTMENT_OCID || secrets.OCI_TENANCY_OCID }}
          TF_VAR_tailscale_auth_key: ${{ secrets.TAILSCALE_AUTH_KEY }}
          TF_VAR_ssh_public_key: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
          TF_VAR_ssh_private_key: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
          TF_VAR_pat_ghcr: ${{ secrets.PAT_GHCR }}
          TF_VAR_boot_volume_size_in_gbs: ${{ vars.OCI_BOOT_VOLUME_SIZE || 200 }}
          TF_VAR_release_version: ${{ env.version }}
          ACTION_INPUT: ${{ github.event.inputs.action || 'apply' }}
        run: |
          if [ "$ACTION_INPUT" == "destroy" ]; then
            echo "Running OpenTofu Destroy..."
            tofu destroy -auto-approve
          else
            echo "Running OpenTofu Apply (Zero-Downtime Pipeline)..."
            tofu apply -auto-approve
            echo "==================================================================="
            echo "✅ INSTÂNCIA OCI VERIFICADA / PROVISIONADA!"
            echo "⚡ O deploy remoto injetou o Binário Versão: $TF_VAR_release_version"
            echo "==================================================================="
          fi
