# Sovereign Pair - Scenario 4: OFFLINE BUNKER (100% Local Desktop)
# Este cenário roda TUDO localmente, incluindo o Motor de Inteligência Artificial (Ollama).
# ATENÇÃO: Consumirá muita GPU e Memória RAM se os modelos forem ativados simultaneamente.

services:
  # 1. Banco de Dados Relacional Local
  postgres:
    image: postgres:15-alpine
    container_name: sovereign-db-offline
    read_only: true
    tmpfs:
      - /tmp
      - /var/run/postgresql
    security_opt:
      - no-new-privileges:true
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sovereign}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-master_pwd}
      POSTGRES_DB: ${POSTGRES_DB:-sovereign_db}
    volumes:
      - pgdata-offline:/var/lib/postgresql/data
    networks:
      - sovereign-net-offline

  # 2. Banco Vetorial Local (ChromaDB)
  chroma:
    image: chromadb/chroma:latest
    container_name: sovereign-chroma-offline
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    restart: always
    volumes:
      - chroma-data-offline:/data
    environment:
      - IS_PERSISTENT=TRUE
    networks:
      - sovereign-net-offline

  # 3. Inteligência Artificial e Embeddings (OLLAMA LOCAL)
  ollama:
    image: ollama/ollama:latest
    container_name: sovereign-ollama-offline
    restart: always
    volumes:
      - ollama-data-offline:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - sovereign-net-offline

  # 4. Backend Mestre da Inteligência (FastAPI)
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: sovereign-api-offline
    user: "1000:1000"
    restart: always
    depends_on:
      - postgres
      - chroma
      - ollama
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-sovereign}:${POSTGRES_PASSWORD:-master_pwd}@postgres:5432/${POSTGRES_DB:-sovereign_db}
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
      - OLLAMA_BASE_URL=http://ollama:11434
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - ALLOWED_ORIGINS=http://localhost:8080,http://localhost:5173,app://sensusvault.local
      - SOVEREIGN_CONF=/app/data/sovereign.conf
      - VAULT_PATH=/app/data/vault
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env
      - ./src:/app/src
      - ${VAULT_PATH:-./data/vault}:/app/data/vault
      - ${HOME}:${HOME}
    networks:
      - sovereign-net-offline
    ports:
      - "8000:8000"

  # 5. Frontend Web App (Vue 3 UI)
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: sovereign-web-offline
    restart: always
    depends_on:
      - api
    networks:
      - sovereign-net-offline
    ports:
      - "8080:80"

volumes:
  pgdata-offline:
  chroma-data-offline:
  ollama-data-offline:


networks:
  sovereign-net-offline:
    driver: bridge
