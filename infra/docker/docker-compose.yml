# Sovereign Pair Base Architecture
services:
  caddy:
    image: caddy:2-alpine
    container_name: sovereign-caddy
    network_mode: service:tailscale
    read_only: true
    tmpfs:
      - /tmp
      - /var/run
    security_opt:
      - no-new-privileges:true
    restart: always
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - tailscale
      - api
      - web

  # 1. Banco de Dados Relacional Migrado para local SQLite (Aguardando implantação nativa Rust/SQLite-Vec)

  # 3. Backend Mestre da Inteligência (Python/FastAPI)
  api:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.api
    container_name: sovereign-api
    user: "1000:1000"
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # - DATABASE_URL=postgresql://${POSTGRES_USER:-sovereign}:${POSTGRES_PASSWORD:-master_pwd}@postgres:5432/${POSTGRES_DB:-sovereign_db}
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - LLM_PROVIDER=${LLM_PROVIDER:-gemini}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:5173,http://sovereign-pair.local,https://localhost,https://127.0.0.1,app://sensusvault.local,capacitor://localhost,http://localhost}
      - SOVEREIGN_CONF=/app/data/sovereign.conf
      - VAULT_PATH=/app/data/vault
    # Montagem Bind para espelhar a pasta data local caso o SQLite precise sobreviver por qualquer motivo legal,
    # e para leitura rápida de arquivos em lote.
    volumes:
      - ../../data:/app/data
      - ../../.env:/app/.env
      - ../../src:/app/src
      - ${VAULT_PATH:-../../data/vault}:/app/data/vault
      - ${HOME}:${HOME}
    networks:
      - sovereign-net
    # PORTA Ocultada de propósito! Quem fará o port forward será o Tailscale e o Caddy.
    # Exposta temporariamente para testes locais do npm run dev
    ports:
      - "8000:8000"
    # 4. Frontend Web App (Vue 3 + Vite -> Nginx)
  web:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.web
    container_name: sovereign-web
    restart: always
    depends_on:
      - api
    networks:
      - sovereign-net
    # Acesso bloqueado externamente. Apenas o Caddy redireciona o tráfego 443 -> web:80
    # ports:
    #   - "8080:80"

    # 5. Zero-Trust VPN Sidecar (Tailscale Subnet Router)
  tailscale:
    image: tailscale/tailscale:latest
    container_name: sovereign-tailscale
    read_only: true
    tmpfs:
      - /tmp
      - /run
      - /var/run
    security_opt:
      - no-new-privileges:true
    hostname: sovereign-cloud-api
    restart: always
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_EXTRA_ARGS=--accept-dns=true
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=true
    volumes:
      - tailscale-state:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
      - sys_module
    networks:
      - sovereign-net
    ports:
      - "127.0.0.1:80:80"
      - "127.0.0.1:443:443"

volumes:
  pgdata:
  ollama-data:
  tailscale-state:
  caddy-data:
  caddy-config:


networks:
  sovereign-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
