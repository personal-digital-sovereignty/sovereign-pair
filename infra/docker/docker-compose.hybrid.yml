# Sovereign Pair - Scenario 2: TRUE CIBRID (Desktop Vault + Cloud Muscle)
# Este cenário roda o Banco e os Arquivos LOACALMENTE, mas consome o processamento da Oracle.
# IMPORTANTE: Configure OLLAMA_BASE_URL no seu .env para apontar para o IP Tailscale da Oracle!

services:
  # 0. Edge Router Local (Caddy SSL Mestre)
  caddy:
    image: caddy:2-alpine
    container_name: sovereign-caddy-local
    read_only: true
    tmpfs:
      - /tmp
      - /var/run
    security_opt:
      - no-new-privileges:true
    restart: always
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data-local:/data
      - caddy-config-local:/config
    depends_on:
      - api
      - web
    ports:
      - "80:80"
      - "443:443"
    networks:
      - sovereign-net-local

  # 3. Backend Mestre da Inteligência (FastAPI) - Lendo cofres locais!
  api:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.api
    container_name: sovereign-api-local
    user: "1000:1000"
    restart: always
    environment:
      - DATABASE_URL=sqlite:////app/data/sovereign_memory.db
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL}
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - ALLOWED_ORIGINS=http://localhost:8080,http://localhost:5173,app://sensusvault.local
      - SOVEREIGN_CONF=/app/data/sovereign.conf
      - VAULT_PATH=/app/data/vault
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ../../data:/app/data
      - ../../.env:/app/.env
      - ../../src:/app/src
      - ${VAULT_PATH:-../../data/vault}:/app/data/vault
      - ${HOME}:${HOME}
    networks:
      sovereign-net-local:
        aliases:
          - sovereign-api

  # 4. Frontend Web App (Vue 3 UI)
  web:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.web
    container_name: sovereign-web-local
    restart: always
    depends_on:
      - api
    networks:
      sovereign-net-local:
        aliases:
          - sovereign-web

volumes:
  caddy-data-local:
  caddy-config-local:


networks:
  sovereign-net-local:
    driver: bridge
