server {
    listen 80;
    server_name localhost;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        # Habilita o Vue Router (History Mode) - Redireciona tudo que não for arquivo pro index.html
        try_files $uri $uri/ /index.html;
    }

    # Desabilita logs fúteis e aumenta segurança
    location ~ /\.ht {
        deny all;
    }

    # Cache de assets estáticos (Imagens, JS minificado)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
}
