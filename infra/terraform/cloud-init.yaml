#cloud-config

hostname: sovereign-coder
preserve_hostname: false

ssh_authorized_keys:
  - ${ssh_public_key}

write_files:
  - path: /etc/default/zramswap
    content: |
      ALGO=lz4
      PERCENT=33
    owner: root:root
    permissions: '0644'

  - path: /etc/systemd/system/ollama.service.d/override.conf
    content: |
      [Service]
      Environment="OLLAMA_HOST=0.0.0.0:11434"
      Environment="OLLAMA_FLASH_ATTENTION=1"
      Environment="OLLAMA_NUM_PARALLEL=4"
      Environment="OLLAMA_KEEP_ALIVE=24h"
    owner: root:root
    permissions: '0644'

runcmd:
  # Aquece o network stack (DHCP/DNS) do Oracle OCI antes do gatilho principal
  - sleep 20

  # 0. Fix Oracle's broken regional APT mirrors strictly before any apt command
  - sudo sed -E -i 's/[a-z0-9-]+\.clouds\.ports\.ubuntu\.com/ports.ubuntu.com/g' /etc/apt/sources.list
  
  # 1. Manually trigger non-interactive apt installations
  - export DEBIAN_FRONTEND=noninteractive
  - sudo -E apt-get update -y
  - sudo -E apt-get upgrade -y
  - sudo -E apt-get install -y curl wget git zram-tools sqlite3
  
  # 2. Apply ZRAM Config for Heavy LLMs
  - sudo systemctl enable --now zramswap
  - sudo systemctl restart zramswap

  # 3. Skip Tailscale up here (Moved to the absolute bottom to prevent MagicDNS breaking downloads)
  - curl -fsSL https://tailscale.com/install.sh | sudo sh

  # 4. Install Ollama Engine
  - curl -fsSL https://ollama.com/install.sh | sudo sh
  - sudo systemctl daemon-reload
  - sudo systemctl enable ollama
  - sudo systemctl restart ollama

  # 5. Pull The Coder (and The Doctor) Models Asynchronously
  - sudo bash -c "nohup ollama pull qwen2.5-coder:7b > /var/log/ollama_pull_coder.log 2>&1 &"
  - sudo bash -c "nohup ollama pull llama3.2:3b > /var/log/ollama_pull_doctor.log 2>&1 &"

  # 6. Install Rust Toolchain & Node.js
  - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
  - curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
  - sudo apt-get install -y nodejs build-essential

  # 7. Disable IPv6 to optimize local VCN routing
  - sudo sysctl -w net.ipv6.conf.all.disable_ipv6=1
  - sudo sysctl -w net.ipv6.conf.default.disable_ipv6=1
  - sudo sysctl -w net.ipv6.conf.lo.disable_ipv6=1

  # 8. Clone Sovereign Pair and Spin Up Baremetal Architecture
  - git clone https://${pat_ghcr}@github.com/Personal-Digital-Sovereignty/sovereign-pair.git /opt/sovereign-pair
  # Prepare environments and vault architecture
  - sudo sh -c "cd /opt/sovereign-pair && cp .env.example .env && sed -i 's/TS_AUTHKEY=tskey-auth-xxxxxxxxx/TS_AUTHKEY=${tailscale_auth_key}/g' .env && mkdir -p ./data/vault"
  
  # 9. Start Tailscale last to secure MagicDNS routing without breaking build resolvers
  - sleep 5
  - sudo tailscale up --authkey=${tailscale_auth_key} --ssh --accept-dns=true --hostname=sovereign-coder
  - sleep 10
  
  # 10. Compile Svelte UI Framework
  - sudo sh -c "cd /opt/sovereign-pair/svelte-ui && npm ci && npm run build"

  # 11. Compile Sovereign Cibrid Core (Rust Native)
  - sudo -u root bash -c "source \$HOME/.cargo/env && cd /opt/sovereign-pair/core && cargo build --release"
  
  # 12. Dematerialize into Systemd Daemon
  - sudo cp /opt/sovereign-pair/core/target/release/sovereign-core /usr/local/bin/
  - sudo cp /opt/sovereign-pair/scripts/sovereign.service /etc/systemd/system/
  - sudo systemctl daemon-reload
  - sudo systemctl enable sovereign
  - sudo systemctl start sovereign
