#cloud-config

hostname: sovereign-coder
preserve_hostname: false

ssh_authorized_keys:
  - ${ssh_public_key}

package_update: true
package_upgrade: true

packages:
  - curl
  - wget
  - git
  - zram-tools

write_files:
  - path: /etc/default/zramswap
    content: |
      ALGO=lz4
      PERCENT=33
    owner: root:root
    permissions: '0644'

  - path: /etc/systemd/system/ollama.service.d/override.conf
    content: |
      [Service]
      Environment="OLLAMA_HOST=0.0.0.0:11434"
      Environment="OLLAMA_FLASH_ATTENTION=1"
      Environment="OLLAMA_NUM_PARALLEL=4"
      Environment="OLLAMA_KEEP_ALIVE=24h"
    owner: root:root
    permissions: '0644'

runcmd:
  # 0. Fix Oracle's broken regional APT mirrors (Regex para qualquer região/AD)
  - sed -E -i 's/[a-z0-9-]+\.clouds\.ports\.ubuntu\.com/ports.ubuntu.com/g' /etc/apt/sources.list
  - apt-get update -y

  # 1. Apply ZRAM Config for Heavy LLMs
  - systemctl restart zramswap

  # 2. Install Tailscale and join Sovereign Mesh
  - curl -fsSL https://tailscale.com/install.sh | sh
  - tailscale up --authkey=${tailscale_auth_key} --ssh --accept-dns=true

  # 3. Install Ollama Engine
  - curl -fsSL https://ollama.com/install.sh | sh
  - systemctl daemon-reload
  - systemctl enable ollama
  - systemctl restart ollama

  # 4. Pull The Coder (and The Doctor) Models Asynchronously
  # We use detached processes so the VM finishes booting quickly
  - runuser -l root -c "nohup ollama pull qwen2.5-coder:7b > /var/log/ollama_pull_coder.log 2>&1 &"
  - runuser -l root -c "nohup ollama pull llama3.2:3b > /var/log/ollama_pull_doctor.log 2>&1 &"

  # 5. Install Docker Engine Native
  - curl -fsSL https://get.docker.com | sh
  - systemctl enable docker
  - systemctl start docker

  # 6. Disable IPv6 to prevent Docker Pull network unreachable on Oracle VCN
  - sysctl -w net.ipv6.conf.all.disable_ipv6=1
  - sysctl -w net.ipv6.conf.default.disable_ipv6=1
  - sysctl -w net.ipv6.conf.lo.disable_ipv6=1

  # 7. Clone Sovereign Pair and Spin Up Cibrid Services (RAG + N8N Zero Cost)
  - git clone https://${pat_ghcr}@github.com/Personal-Digital-Sovereignty/sovereign-pair.git /opt/sovereign-pair
  # Prepare environments and vault architecture (Using sh -c because cloud-init runcmd executes each line in a fresh shell)
  - sh -c "cd /opt/sovereign-pair && cp .env.example .env && sed -i 's/TS_AUTHKEY=tskey-auth-xxxxxxxxx/TS_AUTHKEY=${tailscale_auth_key}/g' .env && mkdir -p ./data/vault && sudo docker compose -f docker-compose.yml -f docker-compose.n8n.yml up -d"
