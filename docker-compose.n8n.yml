version: '3.8'

# Sovereign Pair - N8N Zero Cost Architecture
# Módulo Complementar de Automação Cíbrida (Phase 42)

services:
  # 1. Message Broker & In-Memory Cache (Redis)
  redis:
    image: redis:alpine
    container_name: sovereign-redis
    read_only: true
    tmpfs:
      - /tmp
      - /var/run
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"] # Pure In-Memory Mode (Zero I/O Cost)
    networks:
      - sovereign-net
    # A Porta 6379 NÃO é exportada pro host (0.0.0.0).
    # O Redis é acessível apenas internamente pela rede Docker para o N8N e a FastAPI.

  # 2. Automation Engine (N8N)
  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: sovereign-n8n
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      - N8N_HOST=${N8N_HOST:-n8n.tailnet.ts.net}
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://${N8N_HOST:-n8n.tailnet.ts.net}/
      # Timezone
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE:-America/Sao_Paulo}
      # Conexão com o Banco Postgres Principal (sovereign-db)
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB:-sovereign_db}
      - DB_POSTGRESDB_USER=${POSTGRES_USER:-sovereign}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD:-master_pwd}
      # Queue Mode / Redis Integration
      - EXECUTIONS_DATA_SAVE_ON_ERROR=all
      - EXECUTIONS_DATA_SAVE_ON_SUCCESS=none
      - EXECUTIONS_DATA_SAVE_ON_PROGRESS=true
      - QUEUE_BULL_REDIS_HOST=redis
      - QUEUE_BULL_REDIS_PORT=6379
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - sovereign-net
    # A Porta 5678 NÃO é exportada pro host. O Proxy (Caddy/Tailscale) fará o roteamento.
    depends_on:
      - redis

volumes:
  n8n_data:

# Conecta na malha existente levantada pelo docker-compose.yml primário.
networks:
  sovereign-net:
    external: true
